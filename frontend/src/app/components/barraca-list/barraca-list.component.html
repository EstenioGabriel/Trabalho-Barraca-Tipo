<div class="container">
  <div class="header">
    <h2>Barracas Cadastradas</h2>
    <a routerLink="/barracas/nova" class="btn-nova">+ Nova Barraca</a>
  </div>

  <div *ngIf="mensagemSucesso" class="alert alert-success">{{ mensagemSucesso }}</div>
  <div *ngIf="mensagemErro" class="alert alert-error">{{ mensagemErro }}</div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Localização</th>
        <th>Tipo</th>
        <th>Ativa</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let barraca of barracas">
        <td>{{ barraca.id }}</td>
        <td>{{ barraca.nome }}</td>
        <td>{{ barraca.localizacao || '-' }}</td>
        <td>{{ barraca.tipoBarracaNome }}</td>
        <td>{{ barraca.ativo ? 'Sim' : 'Não' }}</td>
        <td class="acoes">
          <a [routerLink]="['/barracas/editar', barraca.id]" class="btn-edit">Editar</a>
          <button (click)="deletar(barraca.id)" class="btn-delete">Excluir</button>
        </td>
      </tr>
      <tr *ngIf="barracas.length === 0">
        <td colspan="6" class="text-center">Nenhuma barraca cadastrada.</td>
      </tr>
    </tbody>
  </table>
</div>
